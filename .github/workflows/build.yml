name: Build Luna Mining OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apt-get update
          apt-get install -y live-build squashfs-tools xorriso wget ca-certificates

      - name: Prepare and Build
        run: |
          mkdir -p build && cd build
          # SSH 서버(openssh-server)와 네트워크 도구 추가
          lb config --mode debian \
                    --binary-images iso-hybrid \
                    --architectures amd64 \
                    --distribution bullseye \
                    --debian-installer false \
                    --archive-areas "main"
          
          # 패키지 리스트에 SSH 추가
          mkdir -p config/package-lists
          echo "openssh-server iproute2 isc-dhcp-client" > config/package-lists/my.list.chroot

          # 사장님의 rootfs 주입
          mkdir -p config/includes.chroot
          cp -r ../rootfs/* config/includes.chroot/

          # [중요] SSH 설정 및 비밀번호 설정 (Hooks 사용)
          mkdir -p config/hooks/live
          cat <<EOF > config/hooks/live/01-setup-ssh.chroot
          #!/bin/sh
          # root 비밀번호를 luna123으로 설정
          echo "root:luna123" | chpasswd
          # SSH root 로그인 허용
          sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          EOF
          chmod +x config/hooks/live/01-setup-ssh.chroot

          # 채굴기(XMRig) 주입
          mkdir -p config/includes.chroot/bin
          wget https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-static-x64.tar.gz
          tar -xf xmrig-6.21.0-linux-static-x64.tar.gz
          cp xmrig-6.21.0/xmrig config/includes.chroot/bin/
          chmod +x config/includes.chroot/bin/xmrig

          # 진짜 빌드 시작
          lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luna-Mining-OS-ISO
          path: build/*.iso
