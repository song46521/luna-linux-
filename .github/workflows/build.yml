name: Build Luna Mining OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동으로 빌드 시작 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build squashfs-tools genisoimage debian-archive-keyring

      - name: Prepare Rootfs
        run: |
          mkdir -p build
          cd build
          # --security false 옵션으로 404 오류 방지 및 데비안 모드 고정
          lb config --mode debian \
                    --binary-images iso-hybrid \
                    --architectures amd64 \
                    --distribution bullseye \
                    --security false \
                    --archive-areas "main" \
                    --mirror-bootstrap "http://deb.debian.org/debian/" \
                    --mirror-chroot "http://deb.debian.org/debian/" \
                    --mirror-binary "http://deb.debian.org/debian/"
          
          # 사장님의 rootfs 복사
          mkdir -p config/includes.chroot
          cp -r ../rootfs/* config/includes.chroot/

          # [중요] 리눅스용 XMRig 정적 바이너리 다운로드 (사장님의 bin 폴더에 주입)
          mkdir -p config/includes.chroot/bin
          wget https://github.com/xmrig/xmrig/releases/download/v6.22.2/xmrig-6.22.2-linux-static-x64.tar.gz
          tar -xf xmrig-6.22.2-linux-static-x64.tar.gz
          cp xmrig-6.22.2/xmrig config/includes.chroot/bin/
          chmod +x config/includes.chroot/bin/xmrig

      - name: Build Luna OS ISO
        run: |
          cd build
          sudo lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luna-Mining-OS-ISO
          path: build/*.iso
