name: Build Luna Mining OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 데비안 순정 환경(bullseye)에서 빌드를 진행하여 버전 충돌을 방지합니다.
    container:
      image: debian:bullseye
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apt-get update
          apt-get install -y live-build squashfs-tools xorriso wget ca-certificates

      - name: Prepare and Build
        run: |
          mkdir -p build && cd build
          # 데비안 순정 환경이므로 가장 표준적인 설정만 사용합니다.
          lb config --mode debian \
                    --binary-images iso-hybrid \
                    --architectures amd64 \
                    --distribution bullseye \
                    --debian-installer false \
                    --archive-areas "main"
          
          # 사장님의 rootfs 주입
          mkdir -p config/includes.chroot
          cp -r ../rootfs/* config/includes.chroot/

          # 채굴기(XMRig) 주입
          mkdir -p config/includes.chroot/bin
          wget https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-static-x64.tar.gz
          tar -xf xmrig-6.21.0-linux-static-x64.tar.gz
          cp xmrig-6.21.0/xmrig config/includes.chroot/bin/
          chmod +x config/includes.chroot/bin/xmrig

          # 진짜 빌드 시작
          lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luna-Mining-OS-ISO
          path: build/*.iso
