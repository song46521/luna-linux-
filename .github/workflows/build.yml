name: Build Luna Mining OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동으로 빌드 시작 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build squashfs-tools genisoimage debian-archive-keyring

      - name: Prepare Rootfs
        run: |
          mkdir -p build
          cd build
          # 모든 서버 주소를 데비안 공식 서버로 강제 고정
          lb config --binary-images iso-hybrid \
                    --architectures amd64 \
                    --distribution bullseye \
                    --parent-distribution bullseye \
                    --parent-mirror-bootstrap "http://deb.debian.org/debian/" \
                    --parent-mirror-chroot "http://deb.debian.org/debian/" \
                    --parent-mirror-binary "http://deb.debian.org/debian/" \
                    --mirror-bootstrap "http://deb.debian.org/debian/" \
                    --mirror-chroot "http://deb.debian.org/debian/" \
                    --mirror-binary "http://deb.debian.org/debian/" \
                    --mirror-binary-security "http://security.debian.org/debian-security" \
                    --mirror-chroot-security "http://security.debian.org/debian-security"
          
          # 사장님이 만든 rootfs를 주입
          mkdir -p config/includes.chroot
          cp -r ../rootfs/* config/includes.chroot/

      - name: Build Luna OS ISO
        run: |
          cd build
          sudo lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luna-Mining-OS-ISO
          path: build/*.iso
